<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Ebook Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">
  <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

    <div class="bg-white p-6 rounded-2xl shadow">
      <h1 class="text-2xl font-bold mb-2">Premium Ebook Generator</h1>
      <p class="text-gray-500 mb-6">AI-powered ebook product builder.</p>

      <form id="ebookForm" class="space-y-4">
        <div>
          <label class="block font-medium mb-1">Topic</label>
          <input id="topic" class="w-full border p-3 rounded-lg" placeholder="Digital Product Business" required>
        </div>

        <div>
          <label class="block font-medium mb-1">Audience</label>
          <input id="audience" class="w-full border p-3 rounded-lg" placeholder="Filipino beginners na gusto kumita online" required>
        </div>

        <div>
          <label class="block font-medium mb-1">Promise</label>
          <input id="promise" class="w-full border p-3 rounded-lg" placeholder="Makabenta ng unang digital product in 30 days" required>
        </div>

        <div>
          <label class="block font-medium mb-1">Language</label>
          <select id="language" class="w-full border p-3 rounded-lg">
            <option value="Taglish">Taglish</option>
            <option value="English">English</option>
            <option value="Filipino">Filipino</option>
          </select>
        </div>

        <button id="submitBtn" class="w-full bg-indigo-600 text-white font-bold p-3 rounded-lg">
          Generate Premium Ebook
        </button>
      </form>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
      <h2 class="text-xl font-bold mb-4">Output</h2>
      <div id="status" class="text-gray-500 mb-4">Ready.</div>
      <pre id="output" class="bg-gray-900 text-green-300 p-4 rounded-xl overflow-auto text-sm whitespace-pre-wrap max-h-[700px]"></pre>
    </div>

  </div>

  <script>
    const form = document.getElementById("ebookForm");
    const statusBox = document.getElementById("status");
    const outputBox = document.getElementById("output");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const payload = {
        topic: document.getElementById("topic").value.trim(),
        audience: document.getElementById("audience").value.trim(),
        promise: document.getElementById("promise").value.trim(),
        language: document.getElementById("language").value,
        style: "Premium Modern",
        price: "₱499",
        depth: "Premium Paid Ebook"
      };

      statusBox.textContent = "Generating...";
      submitBtn.disabled = true;
      submitBtn.textContent = "Generating...";
      outputBox.textContent = "";

      try {
        const response = await fetch("/api/generate-ebook", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.details || data.error || "Generation failed.");
        }

        statusBox.textContent = "Success. AI output generated.";
        outputBox.textContent = JSON.stringify(data, null, 2);

      } catch (error) {
        statusBox.textContent = "Error.";
        outputBox.textContent = error.message;
        console.error(error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Generate Premium Ebook";
      }
    });
  </script>
</body>
</html>
